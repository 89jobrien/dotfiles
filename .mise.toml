[tools]
bun = "latest"
go = "1.25"
node = "22"
python = "3.13"
rust = "1.91"
uv = "latest"

[env]
# Project-local env loading pattern.
# Keep secrets out of this file; put machine-specific values in `mise.local.toml`
# (ignored by git), `.env.local`, or encrypted `secrets/.env.sops.json`.
_.file = [".env", ".env.local", "secrets/.env.json", "secrets/.env.sops.json"]
_.path = ["bin", "scripts", "node_modules/.bin", ".venv/bin", "target/debug", "target/release"]
_.python.venv = { path = ".venv", create = true }
PJ_TUI_EVENT_STREAM = "app"
PJ_TUI_EVENT_MAX_CHARS = "140"

# ---------------------------------------------------------------------------
# Bootstrap
# ---------------------------------------------------------------------------

[tasks.install]
description = "Run full bootstrap install"
run = "./install.sh"

[tasks.dot]
description = "Fast install — stow symlinks + configs only (no packages, no compilation)"
run = "./install.sh --dot-only"

[tasks.stow]
description = "Restow managed package set only"
run = "./install.sh --no-packages --no-post"

[tasks.post]
description = "Run post bootstrap hooks only"
run = "./install.sh --no-packages --no-stow"

[tasks.doctor]
description = "Check environment requirements"
run = "./scripts/doctor.sh"

[tasks.drift]
description = "Detect local drift from managed dotfiles"
run = "./scripts/drift-check.sh"

# ---------------------------------------------------------------------------
# Dev Environment
# ---------------------------------------------------------------------------

[tasks.dev-tools]
description = "Install non-cargo dev tools (baml-cli via bun/npm)"
run = "./scripts/setup-dev-tools.sh"

[tasks.rust-tools]
description = "Compile and install Rust tools (alacritty, bacon, toolz, obfsck, etc.) — run after bootstrap"
run = "./scripts/setup-rust-tools.sh"

[tasks.nix-install]
description = "Install Nix and apply flake packages"
run = ". /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh && ./scripts/setup-nix.sh"

[tasks.nix-update]
description = "Update nixpkgs lock and reinstall packages"
run = ". /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh && nix flake update && ./scripts/setup-nix.sh"

[tasks.nix-check]
description = "Verify Nix installation and package availability"
run = ". /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh && nix profile list && nix flake check"

[tasks.nvim]
description = "Run Neovim NvChad + Avante setup"
run = "./scripts/setup-nvchad-avante.sh"

[tasks.macos]
description = "Configure macOS defaults and link Raycast scripts"
run = "./scripts/setup-macos.sh"

[tasks.raycast-scripts]
description = "Link managed Raycast scripts (alias for macos)"
run = "./scripts/setup-macos.sh"

# ---------------------------------------------------------------------------
# Secrets
# ---------------------------------------------------------------------------

[tasks.secrets-check]
description = "Fail if plaintext secret files/content are staged"
run = "./scripts/secrets/check-no-plaintext.sh"

[tasks.secrets-sops-json]
description = "Generate encrypted secrets/.env.sops.json from local secrets/.env.json"
run = "./scripts/secrets/make-sops-env-json.sh"

[tasks.secrets-setup]
description = "Interactive secrets setup (prompts for API keys and credentials)"
run = "./scripts/setup-secrets-interactive.sh"

# ---------------------------------------------------------------------------
# AI Tools
# ---------------------------------------------------------------------------

[tasks.ai-tools]
description = "Install personal MCP and configure all AI tool configs"
run = "./scripts/setup-ai-tools.sh"

[tasks.personal-mcp]
description = "Install personal MCP and AI configs (alias for ai-tools)"
run = "./scripts/setup-ai-tools.sh"

[tasks.mcp-build]
description = "Build personal-mcp keeping artifacts (for dev iteration)"
run = "KEEP_BUILD_ARTIFACTS=1 ./scripts/setup-ai-tools.sh"

[tasks.ai-config]
description = "Configure AI CLI configs (alias for ai-tools)"
run = "./scripts/setup-ai-tools.sh"

[tasks.hooks-install]
description = "Build hook binaries and generate ~/.claude/hooks/hooks.json"
run = "./scripts/setup-hooks.sh"

# ---------------------------------------------------------------------------
# Maestro
# ---------------------------------------------------------------------------

[tasks.maestro-setup]
description = "Clone/update Maestro and run setup mode from env"
run = "./scripts/setup-maestro.sh"

[tasks.maestro-up]
description = "Run Maestro setup workflow (dev-setup + ci)"
run = "./scripts/maestro-dev.sh up"

[tasks.maestro-up-quick]
description = "Run Maestro quick setup (dev-setup only)"
run = "./scripts/maestro-dev.sh up --quick"

[tasks.maestro-up-api]
description = "Run Maestro setup and start API (dev-setup + ci + api-run)"
run = "./scripts/maestro-dev.sh up --api-run"

[tasks.maestro-handoff]
description = "Write Maestro handoff to private ctx directory"
run = "./scripts/maestro-dev.sh handoff"

[tasks.maestro-doctor]
description = "Validate Maestro repo markers and local prerequisites"
run = "./scripts/maestro-dev.sh doctor"

[tasks.maestro-where]
description = "Print resolved Maestro repository path"
run = "./scripts/maestro-dev.sh where"

[tasks.companion-repos]
description = "Clone companion project repos (personal-mcp, dumcp, maestro-dev)"
run = "./scripts/setup-companion-repos.sh"

# ---------------------------------------------------------------------------
# Tailscale
# ---------------------------------------------------------------------------

[tasks.ts-devices]
description = "List Tailscale devices with IPs and expiry"
run = "./tailscale/scripts/parse-devices.sh list"

[tasks.ts-ssh]
description = "Generate SSH config for Tailscale devices"
run = "./tailscale/scripts/generate-ssh-config.sh"

[tasks.ts-expiry]
description = "Check Tailscale device key expiry dates"
run = "./tailscale/scripts/check-expiry.sh"

[tasks.ts-refresh]
description = "Import new Tailscale device export CSV"
run = "./tailscale/scripts/refresh-devices.sh"

# ---------------------------------------------------------------------------
# SSH Management
# ---------------------------------------------------------------------------

[tasks.ssh-sync]
description = "Sync SSH public key to all Tailscale devices"
run = "./ssh-tools/scripts/sync-keys.sh"

[tasks.ssh-sync-dry-run]
description = "Preview SSH key sync without making changes"
run = "DRY_RUN=1 ./ssh-tools/scripts/sync-keys.sh"

# ---------------------------------------------------------------------------
# Dotfiles Management
# ---------------------------------------------------------------------------

[tasks.tasks]
description = "Interactive task discovery and execution"
run = "./scripts/tasks-interactive.sh"

[tasks.update-check]
description = "Check for dotfiles updates from remote"
run = "./scripts/check-updates.sh"

[tasks.update]
description = "Update dotfiles from remote and reload config"
run = "./scripts/update-dotfiles.sh"

# ---------------------------------------------------------------------------
# Containers / Kubernetes
# ---------------------------------------------------------------------------

[tasks.up]
description = "Start runtime, bring up k3d, then run doctor"
run = "mise run container-start && mise run k3d-up && mise run doctor"

[tasks.container-start]
description = "Start local container runtime (colima)"
run = "./scripts/container-dev.sh start"

[tasks.container-stop]
description = "Stop local container runtime (colima)"
run = "./scripts/container-dev.sh stop"

[tasks.container-status]
description = "Show local container and kube status"
run = "./scripts/container-dev.sh status"

[tasks.colima-autostart-enable]
description = "Enable Colima auto-start on login"
run = "./colima/scripts/enable-autostart.sh"

[tasks.colima-autostart-disable]
description = "Disable Colima auto-start on login"
run = "./colima/scripts/disable-autostart.sh"

[tasks.compose-up]
description = "Build and start local docker compose stack"
run = "./scripts/compose-dev.sh up"

[tasks.compose-down]
description = "Stop and remove local docker compose stack"
run = "./scripts/compose-dev.sh down"

[tasks.compose-status]
description = "Show local docker compose service status"
run = "./scripts/compose-dev.sh status"

[tasks.compose-logs]
description = "Tail local docker compose service logs"
run = "./scripts/compose-dev.sh logs"

[tasks.k3d-up]
description = "Create local k3d cluster"
run = "./scripts/container-dev.sh k3d-up"

[tasks.k3d-down]
description = "Delete local k3d cluster"
run = "./scripts/container-dev.sh k3d-down"

[tasks.kind-up]
description = "Create local kind cluster"
run = "./scripts/container-dev.sh kind-up"

[tasks.kind-down]
description = "Delete local kind cluster"
run = "./scripts/container-dev.sh kind-down"

[tasks.tilt-up]
description = "Start Tilt from the current directory"
run = "./scripts/container-dev.sh tilt-up"

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------

[tasks.observe]
description = "Show one-shot runtime and cluster summary"
run = "./scripts/observe-dev.sh summary"

[tasks.observe-k8s]
description = "Open k9s cluster UI"
run = "./scripts/observe-dev.sh k8s"

[tasks.observe-logs]
description = "Tail all Kubernetes logs with stern"
run = "./scripts/observe-dev.sh logs"

[tasks.observe-docker]
description = "Live-refresh docker container list"
run = "./scripts/observe-dev.sh docker"

[tasks.observe-docker-events]
description = "Stream docker events"
run = "./scripts/observe-dev.sh docker-events"

[tasks.observe-docker-stats]
description = "Stream docker stats"
run = "./scripts/observe-dev.sh docker-stats"

[tasks.health]
description = "Show one-shot system health and resource summary"
run = "./scripts/system-health.sh summary"

[tasks.health-live]
description = "Open interactive system monitor"
run = "./scripts/system-health.sh live"

[tasks.health-procs]
description = "Show process resource usage list"
run = "./scripts/system-health.sh procs"

[tasks.health-disk]
description = "Show disk usage summary"
run = "./scripts/system-health.sh disk"

# ---------------------------------------------------------------------------
# Logs (Vector)
# ---------------------------------------------------------------------------

[tasks.logs-central-validate]
description = "Validate Vector config for Claude centralized logs"
run = "mkdir -p ~/.local/state/vector && vector validate vector/.config/vector/vector.yaml"

[tasks.logs-central-run]
description = "Run Vector in foreground with Claude log config"
run = "mkdir -p ~/.local/state/vector && vector --config vector/.config/vector/vector.yaml"

[tasks.logs-central-dashboard]
description = "Serve local Claude logs dashboard"
run = "python3 ./scripts/claude-log-dashboard.py"

[tasks.logs-sessions]
description = "List Claude Code sessions with tool/token stats"
run = "rust-script ./scripts/claude-sessions.rs sessions"

[tasks.logs-tools]
description = "Tool call frequency across all Claude Code sessions"
run = "rust-script ./scripts/claude-sessions.rs tools"

[tasks.logs-agents]
description = "Subagent dispatch breakdown by type"
run = "rust-script ./scripts/claude-sessions.rs agents --detail"

[tasks.logs-central-retention]
description = "Apply retention/compression to centralized Claude logs"
run = "./scripts/claude-log-retention.sh"

[tasks.logs-central-retention-dry]
description = "Dry-run retention/compression for centralized Claude logs"
run = "./scripts/claude-log-retention.sh --dry-run"

[tasks.logs-central-service-install]
description = "Install and start Vector launchd service"
run = "./scripts/vector-service.sh install"

[tasks.logs-central-service-start]
description = "Start Vector launchd service"
run = "./scripts/vector-service.sh start"

[tasks.logs-central-service-stop]
description = "Stop Vector launchd service"
run = "./scripts/vector-service.sh stop"

[tasks.logs-central-service-restart]
description = "Restart Vector launchd service"
run = "./scripts/vector-service.sh restart"

[tasks.logs-central-service-status]
description = "Show Vector launchd service status"
run = "./scripts/vector-service.sh status"

[tasks.logs-central-service-logs]
description = "Tail Vector launchd stdout/stderr logs"
run = "./scripts/vector-service.sh logs"

[tasks.logs-central-service-uninstall]
description = "Uninstall Vector launchd service"
run = "./scripts/vector-service.sh uninstall"

[tasks.logs-central-retention-service-install]
description = "Install daily launchd retention schedule"
run = "./scripts/vector-retention-service.sh install"

[tasks.logs-central-retention-service-status]
description = "Show retention launchd schedule status"
run = "./scripts/vector-retention-service.sh status"

[tasks.logs-central-retention-service-run-now]
description = "Trigger retention run immediately"
run = "./scripts/vector-retention-service.sh run-now"

[tasks.logs-central-retention-service-logs]
description = "Tail retention scheduler logs"
run = "./scripts/vector-retention-service.sh logs"

[tasks.logs-central-retention-service-uninstall]
description = "Uninstall daily launchd retention schedule"
run = "./scripts/vector-retention-service.sh uninstall"

# ---------------------------------------------------------------------------
# Rust
# ---------------------------------------------------------------------------

[tasks.rust-clean]
description = "Sweep Rust build artifacts older than RUST_CLEAN_DAYS days (default: 14) under RUST_CLEAN_DIR (default: ~/dev)"
run = "./scripts/rust-clean.sh"

[tasks.rust-clean-dry]
description = "Dry-run Rust artifact sweep — show what would be removed"
run = "./scripts/rust-clean.sh --dry-run"

[tasks.rust-clean-service-install]
description = "Install weekly launchd schedule for Rust artifact cleanup (macOS only)"
run = "./scripts/rust-clean-service.sh install"

[tasks.rust-clean-service-uninstall]
description = "Uninstall Rust clean launchd schedule"
run = "./scripts/rust-clean-service.sh uninstall"

[tasks.rust-clean-service-status]
description = "Show Rust clean launchd service status"
run = "./scripts/rust-clean-service.sh status"

[tasks.rust-clean-service-run-now]
description = "Trigger immediate Rust artifact cleanup via launchd"
run = "./scripts/rust-clean-service.sh run-now"

[tasks.rust-clean-service-logs]
description = "Tail Rust clean service stdout/stderr logs"
run = "./scripts/rust-clean-service.sh logs"

# Toolz
# ---------------------------------------------------------------------------

[tasks.toolz-install]
description = "Build and install toolz CLI from ~/dev/tools to ~/.local/bin/toolz"
run = "cargo install --path ${HOME}/dev/tools --root ${HOME}/.local --force"

[tasks.toolz-dev]
description = "Build toolz in dev mode (no install)"
run = "cd ${HOME}/dev/tools && cargo build"

# ---------------------------------------------------------------------------
# Code Quality
# ---------------------------------------------------------------------------

[tasks.shellcheck]
description = "Run shellcheck on all shell scripts"
run = """
find scripts -name '*.sh' -type f -print0 | \
  xargs -0 shellcheck --color=always --shell=bash
"""

[tasks.test]
description = "Run all unit tests (bats)"
run = "bats tests/**/*.bats"

[tasks.test-lib]
description = "Run library tests only"
run = "bats tests/lib/*.bats"

# ---------------------------------------------------------------------------
# Interactive
# ---------------------------------------------------------------------------

[tasks.menu]
description = "Open interactive menu to explore and run dotfiles commands"
run = "./scripts/menu"
