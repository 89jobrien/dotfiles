# Window settings
[window]
option_as_alt = "Both"

# Font configuration
[font]
size = 13.0

[font.normal]
family = "Menlo"
style = "Regular"

# Shell
[shell]
program = "/bin/zsh"
args = ["-l"]

# Catppuccin Mocha color theme
[colors.primary]
background = "#1E1E2E"
foreground = "#CDD6F4"

[colors.cursor]
text = "#1E1E2E"
cursor = "#F5E0DC"

[colors.selection]
text = "#1E1E2E"
background = "#F5E0DC"

[colors.normal]
black = "#45475A"
red = "#F38BA8"
green = "#A6E3A1"
yellow = "#F9E2AF"
blue = "#89B4FA"
magenta = "#F5C2E7"
cyan = "#94E2D5"
white = "#BAC2DE"

[colors.bright]
black = "#585B70"
red = "#F38BA8"
green = "#A6E3A1"
yellow = "#F9E2AF"
blue = "#89B4FA"
magenta = "#F5C2E7"
cyan = "#94E2D5"
white = "#A6ADC8"

# Keyboard bindings
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\x1b\r"

# Cmd+C/V for copy/paste
[[keyboard.bindings]]
key = "C"
mods = "Command"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Command"
action = "Paste"

# Cmd+K to clear screen
[[keyboard.bindings]]
key = "K"
mods = "Command"
chars = "\x0c"

# Cmd+Left/Right for beginning/end of line
[[keyboard.bindings]]
key = "Left"
mods = "Command"
chars = "\x1bOH"

[[keyboard.bindings]]
key = "Right"
mods = "Command"
chars = "\x1bOF"

# Option+Left/Right for word navigation
[[keyboard.bindings]]
key = "Left"
mods = "Alt"
chars = "\x1bb"

[[keyboard.bindings]]
key = "Right"
mods = "Alt"
chars = "\x1bf"

# Cmd+Backspace to delete to beginning of line
[[keyboard.bindings]]
key = "Back"
mods = "Command"
chars = "\x15"
