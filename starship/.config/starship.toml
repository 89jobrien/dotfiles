# Starship prompt — two-line layout
# Line 1: directory, git, languages, duration, time
# Line 2: → (green on success, red on error)

add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$rust\
$golang\
$nodejs\
$cmd_duration\
$fill\
$time\
$line_break\
$character"""

[fill]
symbol = " "

[character]
success_symbol = "[→](bold green)"
error_symbol   = "[→](bold red)"
vimcmd_symbol  = "[←](bold green)"

[directory]
truncation_length = 4
truncate_to_repo  = true
style             = "bold blue"

[git_branch]
format = "[$symbol$branch]($style) "
style  = "bold purple"

[git_status]
format    = "([$all_status$ahead_behind]($style) )"
style     = "bold red"
conflicted = "⚡"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?"
stashed    = "$"
modified   = "!"
staged     = "+"
renamed    = "»"
deleted    = "✘"

[rust]
format = "[$symbol$version]($style) "
style  = "bold red"

[golang]
format = "[$symbol$version]($style) "
style  = "bold cyan"

[nodejs]
format = "[$symbol$version]($style) "
style  = "bold green"

[cmd_duration]
min_time = 2_000
format   = "[⏱ $duration]($style) "
style    = "yellow"

[time]
disabled = false
format   = "[$time]($style)"
style    = "dimmed white"
