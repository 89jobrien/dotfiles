#
#                                    V E C T O R
#                                   Configuration
#
# ------------------------------------------------------------------------------
# Website: https://vector.dev
# Docs: https://vector.dev/docs
# Chat: https://chat.vector.dev
# ------------------------------------------------------------------------------

# Vector data directory
data_dir: "/opt/homebrew/var/lib/vector/"

# ==============================================================================
# SOURCES - Where logs come from
# ==============================================================================

sources:
  # Watch application log files (add your AI project logs here)
  app_logs:
    type: "file"
    include:
      - "/Users/joe/logs/applications/**/*.log"
      - "/Users/joe/projects/**/*.log"  # Adjust this path to your project location
    read_from: "end"  # Start from end of file (don't read old logs on startup)

  # Watch script output logs
  script_logs:
    type: "file"
    include:
      - "/Users/joe/logs/scripts/**/*.log"
    read_from: "end"

  # Internal Vector logs
  vector_internal:
    type: "internal_logs"

# ==============================================================================
# TRANSFORMS - Process and enrich logs
# ==============================================================================

transforms:
  # Add timestamp and metadata to application logs
  process_app_logs:
    type: "remap"
    inputs: ["app_logs"]
    source: |
      .log_type = "application"
      .hostname = get_hostname!()
      if !exists(.timestamp) {
        .timestamp = now()
      }

  # Add metadata to script logs
  process_script_logs:
    type: "remap"
    inputs: ["script_logs"]
    source: |
      .log_type = "script"
      .hostname = get_hostname!()
      if !exists(.timestamp) {
        .timestamp = now()
      }

  # Process Vector's own logs
  process_vector_logs:
    type: "remap"
    inputs: ["vector_internal"]
    source: |
      .log_type = "vector_internal"

# ==============================================================================
# SINKS - Where logs go
# ==============================================================================

sinks:
  # Store application logs organized by date
  app_log_files:
    type: "file"
    inputs: ["process_app_logs"]
    path: "/Users/joe/logs/vector/app-%Y-%m-%d.log"
    encoding:
      codec: "json"

  # Store script logs organized by date
  script_log_files:
    type: "file"
    inputs: ["process_script_logs"]
    path: "/Users/joe/logs/vector/scripts-%Y-%m-%d.log"
    encoding:
      codec: "json"

  # Store Vector's internal logs
  vector_log_files:
    type: "file"
    inputs: ["process_vector_logs"]
    path: "/Users/joe/logs/vector/vector-%Y-%m-%d.log"
    encoding:
      codec: "json"

# ==============================================================================
# API - Enable Vector's management API (optional)
# ==============================================================================

# Uncomment to enable Vector's GraphQL API for monitoring
# Access via: vector top (CLI) or http://localhost:8686 (browser)
api:
  enabled: true
  address: "127.0.0.1:8686"
