name: devkit council

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  council:
    name: Council Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install devkit
        run: go install github.com/89jobrien/devkit@latest

      - name: Run devkit council
        id: council
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          OUTPUT=$(devkit council --base main 2>&1) || true
          # Store multiline output for the next step
          {
            echo "output<<DEVKIT_EOF"
            echo "$OUTPUT"
            echo "DEVKIT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- devkit-council -->';
            const body = `${marker}\n## devkit council\n\n\`\`\`\n${{ steps.council.outputs.output }}\n\`\`\`\n\n*Generated by [devkit council](https://github.com/89jobrien/devkit) · ${{ github.sha }}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
