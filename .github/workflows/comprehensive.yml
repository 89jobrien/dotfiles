name: Comprehensive Tests

on:
  workflow_dispatch:
  schedule:
    # Run weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  test-all-linux:
    name: All Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq shellcheck

      - name: Run complete test suite
        run: |
          echo "🧪 Running all library tests on Linux..."
          total=0
          passed=0

          for test_file in tests/lib/*.bats; do
            name=$(basename "$test_file")
            echo "Running $name..."
            if bats "$test_file"; then
              count=$(grep -c "^@test" "$test_file")
              passed=$((passed + count))
              total=$((total + count))
            else
              count=$(grep -c "^@test" "$test_file")
              total=$((total + count))
            fi
          done

          echo "✅ Passed: $passed/$total tests"
          if [ $passed -lt $total ]; then
            echo "❌ Some tests failed"
            exit 1
          fi

      - name: Generate test report
        if: always()
        run: |
          echo "# Test Report (Linux)" > test-report.md
          echo "" >> test-report.md
          echo "## Summary" >> test-report.md
          echo "" >> test-report.md
          for test_file in tests/lib/*.bats; do
            name=$(basename "$test_file" .bats)
            count=$(grep -c "^@test" "$test_file")
            echo "- **$name**: $count tests" >> test-report.md
          done
          total=$(find tests/lib -name "*.bats" -exec grep -c "^@test" {} + | awk '{sum+=$1} END {print sum}')
          echo "" >> test-report.md
          echo "**Total**: $total tests" >> test-report.md

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-linux
          path: test-report.md
          retention-days: 90

  test-all-macos:
    name: All Tests (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install bats-core jq shellcheck

      - name: Run complete test suite (including launchd)
        run: |
          echo "🧪 Running all library tests on macOS..."
          bats tests/lib/*.bats

      - name: Verify macOS-specific tests
        run: |
          echo "🔍 Verifying macOS-specific functionality..."
          # launchd tests should run on macOS
          if [ -f tests/lib/launchd.bats ]; then
            bats tests/lib/launchd.bats
            echo "✅ launchd tests passed"
          fi

  shellcheck-comprehensive:
    name: Shellcheck (All Severities)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run comprehensive shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: style
          format: tty
          ignore_paths: 'scripts/post-bootstrap.local.example.sh'

      - name: Generate shellcheck report
        if: always()
        run: |
          echo "# Shellcheck Report" > shellcheck-report.md
          echo "" >> shellcheck-report.md
          echo "Severity: All levels (error, warning, info, style)" >> shellcheck-report.md
          echo "" >> shellcheck-report.md
          shellcheck -f gcc scripts/*.sh scripts/lib/*.sh > shellcheck-results.txt 2>&1 || true
          if [ -s shellcheck-results.txt ]; then
            echo "## Issues Found" >> shellcheck-report.md
            echo '```' >> shellcheck-report.md
            cat shellcheck-results.txt >> shellcheck-report.md
            echo '```' >> shellcheck-report.md
          else
            echo "✅ No issues found!" >> shellcheck-report.md
          fi

      - name: Upload shellcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-report
          path: shellcheck-report.md
          retention-days: 90

  coverage-analysis:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Analyze test coverage
        run: |
          echo "# Library Coverage Analysis" > coverage.md
          echo "" >> coverage.md
          echo "| Library | Lines | Tests | Test/Line Ratio |" >> coverage.md
          echo "|---------|-------|-------|-----------------|" >> coverage.md

          total_lines=0
          total_tests=0

          for lib in scripts/lib/*.sh; do
            name=$(basename "$lib")
            test_file="tests/lib/${name%.sh}.bats"
            lines=$(wc -l < "$lib" | tr -d ' ')
            total_lines=$((total_lines + lines))

            if [ -f "$test_file" ]; then
              tests=$(grep -c "^@test" "$test_file")
              total_tests=$((total_tests + tests))
              ratio=$(echo "scale=2; $tests / $lines" | bc)
              echo "| $name | $lines | $tests | $ratio |" >> coverage.md
            else
              echo "| $name | $lines | 0 | 0.00 |" >> coverage.md
            fi
          done

          echo "" >> coverage.md
          echo "**Totals**: $total_lines lines, $total_tests tests" >> coverage.md
          overall_ratio=$(echo "scale=2; $total_tests / $total_lines" | bc)
          echo "**Overall Ratio**: $overall_ratio" >> coverage.md

          cat coverage.md

      - name: Upload coverage analysis
        uses: actions/upload-artifact@v4
        with:
          name: coverage-analysis
          path: coverage.md
          retention-days: 90

  integration-checks:
    name: Integration Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify library dependencies
        run: |
          echo "🔍 Checking library dependency order..."
          # Verify log.sh has no dependencies
          if grep -q "^source.*scripts/lib/" scripts/lib/log.sh 2>/dev/null; then
            echo "❌ log.sh should not source other libraries"
            exit 1
          fi
          echo "✅ log.sh is dependency-free"

          # Verify other libraries source log.sh
          for lib in scripts/lib/{cmd,pkg,dryrun,json,launchd}.sh; do
            if [ -f "$lib" ]; then
              if ! grep -q "scripts/lib/log.sh" "$lib"; then
                echo "⚠️  $(basename $lib) doesn't source log.sh"
              fi
            fi
          done

      - name: Check documentation consistency
        run: |
          echo "📚 Verifying documentation is up to date..."

          # Check if all libraries are documented
          for lib in scripts/lib/*.sh; do
            name=$(basename "$lib" .sh)
            if ! grep -q "$name.sh" scripts/lib/README.md; then
              echo "⚠️  $name.sh not documented in README.md"
            fi
            if ! grep -q "$name.sh" SCRIPTS.md; then
              echo "⚠️  $name.sh not documented in SCRIPTS.md"
            fi
          done

          echo "✅ Documentation check complete"

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-all-linux, test-all-macos, shellcheck-comprehensive, coverage-analysis, integration-checks]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Comprehensive Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Linux Tests: ${{ needs.test-all-linux.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- macOS Tests: ${{ needs.test-all-macos.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Shellcheck: ${{ needs.shellcheck-comprehensive.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage Analysis: ${{ needs.coverage-analysis.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Checks: ${{ needs.integration-checks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Detailed reports available in workflow artifacts" >> $GITHUB_STEP_SUMMARY
